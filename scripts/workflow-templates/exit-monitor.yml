name: Exit Monitor — dual cron (market 5min + off-hours 15min)

# v3.5 (2026-05-14): runtime_state.json now custodies the IntradayProfit-
# Governor FSM and per-position MFE peaks. state.json continues to hold
# daily-learning's adapter snapshot (NOT touched here).
#
# Why two files: 5-min monitors mustn't commit state.json (rule C); doing
# so race-conditions daily-learning's writes and burns the OAuth proxy
# quota. runtime_state.json is the cron-scoped runtime store — exit-
# monitor is the natural custodian because it already polls every 5 min
# and is the consumer of the data. STATE_WRITE_ACTOR=intraday-monitor
# satisfies shared.state_policy.RUNTIME_STATE_ACTORS.
#
# v3.4.1 (2026-05-13) note kept for history: the commit step exists at all
# because peak_tracker silently lost its state every tick before this fix.

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
    - cron: '*/15 0-12,21-23 * * *'
    - cron: '*/15 * * * 0,6'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r exit-monitor/requirements.txt

      - name: Run exit monitor
        env:
          PYTHONIOENCODING:           utf-8
          LC_ALL:                     C
          LANG:                       C
          # IntradayProfitGovernor writes to learning-loop/runtime_state.json.
          # This actor name unlocks shared.state_policy.can_write_runtime_state.
          STATE_WRITE_ACTOR:          intraday-monitor
          INTRADAY_PROTECTION_ENABLED: 'true'
          ALPACA_API_KEY:             ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:          ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_EXIT_WORKER_URL: ${{ secrets.CLOUDFLARE_EXIT_WORKER_URL }}
          GMAIL_USER:                 ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:               ${{ secrets.NOTIFY_EMAIL }}
        run: python exit-monitor/monitor.py

      - name: Commit runtime_state.json + audit JSONL if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          # runtime_state.json  : IntradayProfitGovernor FSM + position MFE
          # journal/autonomy/   : audit JSONL written by emit_audit()
          # NOTE: state.json is NOT committed here per spec rule C —
          # exit-monitor must never write the daily-learning snapshot.
          # peak_tracker shim routes all v3.5 writes to runtime_state.json.
          git add learning-loop/runtime_state.json 2>/dev/null || true
          git add journal/autonomy/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit (no peak update / no transitions this tick)."
          else
            git commit -m "exit-monitor: runtime_state $(date -u +%Y-%m-%d_%H%M) [automerge]"
            for attempt in 1 2 3; do
              if git push origin "$BRANCH"; then
                echo "Pushed runtime state on attempt ${attempt}."
                exit 0
              fi
              git pull --rebase origin "$BRANCH" || true
              sleep $((attempt * 2))
            done
            echo "Push failed after 3 attempts; runtime state visible in this run's logs."
          fi
