name: Exit Monitor — dual cron (market 5min + off-hours 15min)

# v3.4.1 (2026-05-13): added commit step to persist peak_tracker state.
# Without this, shared/peak_tracker.py writes state.json on the runner
# but changes are discarded — daily_peak/trailing_state never persist
# across cron ticks, so PROFIT_LOCK + trailing stop are silently broken.

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
    - cron: '*/15 0-12,21-23 * * *'
    - cron: '*/15 * * * 0,6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r exit-monitor/requirements.txt

      - name: Run exit monitor
        env:
          PYTHONIOENCODING:           utf-8
          LC_ALL:                     C
          LANG:                       C
          ALPACA_API_KEY:             ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:          ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_EXIT_WORKER_URL: ${{ secrets.CLOUDFLARE_EXIT_WORKER_URL }}
          GMAIL_USER:                 ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:               ${{ secrets.NOTIFY_EMAIL }}
        run: python exit-monitor/monitor.py

      - name: Commit peak_tracker + trailing_state if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          # state.json holds: daily_peak (peak_tracker), trailing_state (options peaks)
          git add learning-loop/state.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit (no peak update this tick)."
          else
            git commit -m "exit-monitor: state $(date -u +%Y-%m-%d_%H%M) [automerge]"
            for attempt in 1 2 3; do
              if git push origin "$BRANCH"; then
                echo "Pushed state on attempt ${attempt}."
                exit 0
              fi
              git pull --rebase origin "$BRANCH" || true
              sleep $((attempt * 2))
            done
            echo "Push failed after 3 attempts; state still in this run's logs."
          fi
