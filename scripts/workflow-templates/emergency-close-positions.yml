name: Emergency Close — operator-triggered position closer

# Generic one-shot manual workflow that runs an emergency_close_*.py script
# with real Alpaca GitHub Secrets (ALPACA_API_KEY / ALPACA_SECRET_KEY) —
# bypassing the broken Claude.ai routine sandbox keys.
#
# Default script: scripts/emergency_close_20260513_pm.py (active afternoon
# closure plan flagged 14:27 UTC). Operator can override via workflow_dispatch
# input to run any other scripts/emergency_close_YYYYMMDD*.py file as needed.
#
# v3.4.2 generalized 2026-05-13: was hardcoded to one script; now takes
# script path input. Each new emergency batch creates a new
# emergency_close_*.py file in scripts/, and operator picks it here.

on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Script path (relative to repo root). Default = today afternoon plan.'
        required: false
        type:     string
        default:  'scripts/emergency_close_20260513_pm.py'
      dry_run:
        description: 'Dry-run mode (print orders, do not place)'
        required: false
        type:     boolean
        default:  false

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Validate script path
        run: |
          SCRIPT="${{ inputs.script }}"
          case "$SCRIPT" in
            scripts/emergency_close_*.py) ;;
            *)
              echo "ERROR: script must match scripts/emergency_close_*.py (got: $SCRIPT)"
              exit 1
              ;;
          esac
          if [ ! -f "$SCRIPT" ]; then
            echo "ERROR: $SCRIPT does not exist in repo"
            exit 1
          fi
          echo "Will run: $SCRIPT"

      - name: Run emergency close
        env:
          PYTHONIOENCODING:    utf-8
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python "${{ inputs.script }}" $ARGS 2>&1 | tee /tmp/emergency_close.log
          echo "=== Exit code: $? ==="

      - name: Save log as marker commit
        if: ${{ ! inputs.dry_run }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p exit-reports
          SCRIPT_BASE=$(basename "${{ inputs.script }}" .py)
          OUT="exit-reports/${SCRIPT_BASE}-$(date -u +%Y-%m-%d_%H%M).log"
          cp /tmp/emergency_close.log "$OUT"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          git add "$OUT"
          git commit -m "emergency-close: $(date -u +%Y-%m-%d_%H%M) - ${SCRIPT_BASE} [automerge]"
          for attempt in 1 2 3; do
            if git push origin "$BRANCH"; then
              echo "Pushed marker on attempt ${attempt}."
              exit 0
            fi
            git pull --rebase origin "$BRANCH" || true
            sleep $((attempt * 2))
          done
          echo "Push failed; log is in workflow output."
