name: Crypto Monitor — 11 coins predator scan (24/7)

# v3.2 (2026-05-12): every 5 min 24/7 — crypto trades around the clock,
# short cadence catches predator-mode quick wins. Per-instrument trade
# window in shared/instrument_windows.py keeps everything else gated.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# v3.8.8 (2026-05-18): contents:write required for Curator routine_budget
# persistence step (see commit "Commit routine_budget state" below).
# Allowed write scope = ONLY learning-loop/runtime_state.json
# (enforced by the `git add learning-loop/runtime_state.json` line).
permissions:
  contents: write

jobs:
  scan-crypto:
    runs-on: ubuntu-latest
    # Bumped 5 → 10 min: Curator poll can take up to 90s; with 11 coins
    # × ~2s API calls + Curator we want headroom.
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crypto-monitor/requirements.txt

      - name: Run crypto scan
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:             utf-8
          LC_ALL:                       C
          LANG:                         C
          ALPACA_API_KEY:               ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:            ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY:              ${{ secrets.FINNHUB_API_KEY }}
          CLOUDFLARE_CRYPTO_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_WORKER_URL }}
          CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL }}
          USE_CRYPTO_CURATOR:           'true'
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                 ${{ secrets.NOTIFY_EMAIL }}
        run: python crypto-monitor/monitor.py

      - name: Commit routine_budget state (if changed)
        # v3.8.8 (2026-05-18): Crypto Curator increments routine_budget;
        # persist to main so cap of 5/day for P2_optional actually
        # enforces. Was ignored before → curator could fire 20×/day on
        # active days, eating Anthropic 24h rolling window before P0
        # Senior PM/Challenger/Revise rounds.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # v3.22.3 (2026-06-07) — fix push race condition with parallel
          # automerges. Previous 3-attempt loop ended exit 0 on push
          # failure, silently dropping ledger entries. Now: rebase
          # FIRST to absorb any concurrent automerge commits, debug
          # the working tree, allow up to 5 push retries with rebase
          # between each, and exit 1 on final failure so the job
          # surface the problem instead of hiding it.

          # 1) Rebase first so our commit goes on top of any concurrent
          #    automerge that landed during the scan.
          git pull --rebase origin "${GITHUB_REF_NAME:-main}" || true

          # 2) Debug snapshot before staging.
          echo "===== Debug before add ====="
          pwd
          git status --short learning-loop/runtime_state.json learning-loop/opportunity_ledger/ 2>/dev/null || true
          ls -la learning-loop 2>/dev/null || true
          ls -la learning-loop/opportunity_ledger 2>/dev/null || true
          find learning-loop -maxdepth 3 -type f 2>/dev/null | sort | head -30 || true

          # 3) Stage the narrow scope we are allowed to persist.
          git add learning-loop/runtime_state.json learning-loop/opportunity_ledger/ 2>/dev/null || true

          # 4) Debug snapshot after staging.
          echo "===== Debug after add ====="
          git status --short learning-loop/runtime_state.json learning-loop/opportunity_ledger/ 2>/dev/null || true
          git diff --cached --name-only 2>/dev/null || true

          # 5) Nothing to commit? Exit clean.
          if git diff --cached --quiet 2>/dev/null; then
            echo "No staged runtime_state/opportunity_ledger changes to commit"
            exit 0
          fi

          # 6) Build the commit (single message, narrow scope).
          git commit -m "crypto-monitor: runtime_state + opportunity_ledger $(date -u +%Y-%m-%d_%H%M) [automerge]"

          # 7) Push with up-to-5 retries. Rebase between attempts; never
          #    force-push. Exit 1 if all attempts fail so the job surface
          #    the persistence failure.
          for attempt in 1 2 3 4 5; do
            if git push origin "${GITHUB_REF_NAME:-main}"; then
              echo "Persisted crypto-monitor runtime_state + opportunity_ledger (attempt ${attempt})"
              exit 0
            fi
            echo "Push failed attempt ${attempt}; rebasing and retrying"
            if ! git pull --rebase origin "${GITHUB_REF_NAME:-main}"; then
              echo "Rebase failed; aborting without force-push"
              git rebase --abort 2>/dev/null || true
              exit 1
            fi
            sleep $((attempt * 2))
          done
          echo "push failed after 5 retries — crypto opportunity ledger not persisted"
          exit 1
