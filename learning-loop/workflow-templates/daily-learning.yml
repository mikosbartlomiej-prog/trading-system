name: Daily Learning Loop — Strategy Adapter

on:
  schedule:
    # Codziennie 21:00 UTC (1h po US market close 20:00 UTC)
    - cron: '0 21 * * *'
  workflow_dispatch:

# Permissions:
#   contents: write       — workflow commits state.json + rationale.md + history/
#   pull-requests: write  — Lane 2 auto-PR for LLM-proposed adapter heuristics
#                           (see learning-loop/lane2_pr.py + STRATEGY.md §5.6).
permissions:
  contents:      write
  pull-requests: write

jobs:
  analyze-and-adapt:
    runs-on: ubuntu-latest
    # 3-round daily LLM dialog (Senior PM round1 -> Challenger -> Senior PM
    # revise) means three sequential routine calls of up to 480 s each.
    # Worst-case ≈ 24 min for the dialog + git ops; bumped from 10 -> 30.
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r learning-loop/requirements.txt

      - name: Run daily learning analyzer
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:                utf-8
          LC_ALL:                          C
          LANG:                            C
          ALPACA_API_KEY:                  ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:               ${{ secrets.ALPACA_SECRET_KEY }}
          GMAIL_USER:                      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:              ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                    ${{ secrets.NOTIFY_EMAIL }}
          # LLM augmentation — 3-round daily dialog:
          #   Round 1+3 (Senior PM)  -> CLOUDFLARE_LEARNING_WORKER_URL
          #   Round 2   (Challenger) -> CLOUDFLARE_LEARNING_CHALLENGER_WORKER_URL
          # If the Challenger Worker URL is missing, round 2+3 are skipped
          # and the analyzer applies Senior PM's draft 1 unfiltered (fail-soft).
          CLOUDFLARE_LEARNING_WORKER_URL:             ${{ secrets.CLOUDFLARE_LEARNING_WORKER_URL }}
          CLOUDFLARE_LEARNING_CHALLENGER_WORKER_URL:  ${{ secrets.CLOUDFLARE_LEARNING_CHALLENGER_WORKER_URL }}
          USE_LLM_LEARNING:                           'true'
          # Lane 2 auto-PR — gh CLI uses GH_TOKEN (or GITHUB_TOKEN fallback)
          # to authenticate `gh pr create` against this repo. Default
          # GITHUB_TOKEN has write access to PRs because of the workflow's
          # `pull-requests: write` permission above.
          GH_TOKEN:                        ${{ secrets.GITHUB_TOKEN }}
        run: python learning-loop/analyzer.py

      - name: Commit and push learning state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          # Pull any commits the routine pushed during this run.
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          # Belt-and-suspenders: if the FF pull above re-introduced a
          # pending-llm-*.json that analyzer already consumed locally
          # (auto-merge committed it on origin AFTER analyzer's git rm),
          # explicitly remove it now so the workflow's commit propagates
          # the deletion. --ignore-unmatch makes it a no-op when absent.
          git rm -f --ignore-unmatch \
            learning-loop/pending-llm-daily.json \
            learning-loop/pending-llm-daily-draft1.json \
            learning-loop/pending-llm-daily-challenge.json \
            learning-loop/pending-llm-weekly.json 2>/dev/null || true
          git add learning-loop/state.json learning-loop/rationale.md learning-loop/history/
          # LLM-only artifacts — may not exist on a quiet day; ignore failure
          git add learning-loop/heuristic_proposals.md 2>/dev/null || true
          # v3.1 allocator plan + trace log — new files (git add -u alone misses them)
          git add learning-loop/allocations/ 2>/dev/null || true
          # Stage any other modifications/deletions in learning-loop/
          git add -u learning-loop/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit (no orders this window or no parameter shifts)."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "learning: daily update ${DATE}"
            git push origin "$BRANCH"
            echo "Pushed learning state for ${DATE} to ${BRANCH}."
          fi
