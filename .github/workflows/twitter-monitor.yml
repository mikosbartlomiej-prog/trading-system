name: Twitter Monitor — Bluesky social-graph news

on:
  schedule:
    # Sesja giełdowa: co 5 minut (13:30-20:00 UTC, Mon-Fri)
    - cron: '*/5 13-20 * * 1-5'
    # Po godzinach: co 15 minut przez całą dobę 7 dni w tygodniu
    # (Twitter/Bluesky to global news; eskalacje zdarzają się nocą)
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  scan-twitter:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r twitter-monitor/requirements.txt

      - name: Run twitter (Bluesky) monitor
        env:
          PYTHONIOENCODING:                utf-8
          LC_ALL:                          C
          LANG:                            C
          ALPACA_API_KEY:                  ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:               ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY:                 ${{ secrets.FINNHUB_API_KEY }}
          BLUESKY_HANDLE:                  ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:            ${{ secrets.BLUESKY_APP_PASSWORD }}
          CLOUDFLARE_TWITTER_WORKER_URL:   ${{ secrets.CLOUDFLARE_TWITTER_WORKER_URL }}
          GMAIL_USER:                      ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:              ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                    ${{ secrets.NOTIFY_EMAIL }}
        run: python twitter-monitor/monitor.py
