name: Entry Monitors — Watchdog (re-trigger if missed)

# 2026-05-14: autonomous safety-net for all schedule-based monitors.
#
# Background: 5-min crons can silently skip under GitHub Actions queue
# pressure (observed 2026-05-13/14 multi-hour drift on price + options
# monitors during a big push event). v3.7 expanded coverage: same drift
# pattern now seen on crypto, defense, twitter, reddit monitors despite
# their unrestricted `*/5 * * * *` cron — confirmed in monitor-health
# 19:17 UTC snapshot showing 4 monitors STALE with 20-25x observed
# vs expected interval.
#
# Mechanism:
#   - Cron `*/15 * * * *` (every 15 min, 24/7 — most non-price monitors
#     are 24/7; price + options only fire during session so they're
#     a free retrigger budget the rest of the day).
#   - For each watched workflow, fetch last completed run.
#   - If last run > per-workflow staleness threshold, fire
#     workflow_dispatch via WORKFLOW_PAT.
#   - Per-workflow thresholds (matrix `staleness_minutes`):
#       price/options/crypto/defense/twitter (5-min crons): 12 min
#       reddit (30-min cron):                                40 min
#   - Idempotent: workflow has concurrency cancel-in-progress.
#
# Why PAT vs GITHUB_TOKEN: dispatched workflows via GITHUB_TOKEN don't
# count as user events (anti-recursion), so dependent triggers downstream
# (auto-merge, etc.) wouldn't fire. PAT issued by an operator does count.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min, 24/7
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  actions:  write     # required to read run history + dispatch

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    strategy:
      fail-fast: false
      matrix:
        include:
          - workflow: price-monitor.yml
            staleness_minutes: 12
            session_only: true
          - workflow: options-monitor.yml
            staleness_minutes: 12
            session_only: true
          - workflow: crypto-monitor.yml
            staleness_minutes: 12
            session_only: false
          - workflow: defense-monitor.yml
            staleness_minutes: 12
            session_only: false
          - workflow: twitter-monitor.yml
            staleness_minutes: 12
            session_only: false
          - workflow: reddit-monitor.yml
            staleness_minutes: 40
            session_only: true
          # v3.8.3 (2026-05-15): morning-allocator + exit-monitor +
          # options-exit-monitor added after morning-allocator silently
          # skipped its 13:35 UTC cron today (user had to trigger
          # manually). These workflows are CRITICAL to position
          # management — missing them risks unprotected positions
          # overnight or unexecuted allocation plans.
          - workflow: morning-allocator.yml
            staleness_minutes: 20      # cron is daily 13:35; check 13:35-14:00
            session_only: true
          - workflow: exit-monitor.yml
            staleness_minutes: 12      # cron */5 13-20 weekday + dual off-hours
            session_only: false
          - workflow: options-exit-monitor.yml
            staleness_minutes: 12      # cron */5 13-20 weekday
            session_only: true

    steps:
      - name: Check ${{ matrix.workflow }} last run age
        id: check
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO:     ${{ github.repository }}
          WORKFLOW: ${{ matrix.workflow }}
          THRESHOLD: ${{ matrix.staleness_minutes }}
          SESSION_ONLY: ${{ matrix.session_only }}
        run: |
          # Session-only workflows only get retriggered during US session
          # (13:00-20:00 UTC weekdays). Outside session their cron doesn't
          # fire by design — STALE is expected.
          NOW_UTC_HOUR=$(date -u +%H)
          NOW_UTC_DOW=$(date -u +%u)   # 1=Mon..7=Sun
          if [ "$SESSION_ONLY" = "true" ]; then
            if [ "$NOW_UTC_DOW" -gt 5 ] || [ "$NOW_UTC_HOUR" -lt 13 ] || [ "$NOW_UTC_HOUR" -ge 20 ]; then
              echo "  $WORKFLOW: outside US session (hour=$NOW_UTC_HOUR dow=$NOW_UTC_DOW) — no action"
              echo "stale=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Fetch last 5 runs (mix of schedule + workflow_dispatch) and
          # pick the most recent completed one regardless of trigger.
          NOW_TS=$(date -u +%s)
          RESPONSE=$(curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/runs?per_page=5&status=completed")
          LAST_AT=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          runs = d.get('workflow_runs', [])
          if not runs:
              print('1970-01-01T00:00:00Z')
          else:
              print(runs[0].get('updated_at') or '1970-01-01T00:00:00Z')
          ")
          LAST_TS=$(date -u -d "$LAST_AT" +%s 2>/dev/null || \
                    python3 -c "from datetime import datetime; print(int(datetime.strptime('$LAST_AT', '%Y-%m-%dT%H:%M:%SZ').timestamp()))")
          AGE_S=$((NOW_TS - LAST_TS))
          AGE_M=$((AGE_S / 60))
          echo "  $WORKFLOW last completed run: $LAST_AT ($AGE_M min ago, threshold=$THRESHOLD min)"
          if [ "$AGE_M" -gt "$THRESHOLD" ]; then
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "  STALE — will retrigger"
          else
            echo "stale=false" >> $GITHUB_OUTPUT
            echo "  Fresh — no action"
          fi

      - name: Retrigger ${{ matrix.workflow }}
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.WORKFLOW_PAT }}
          REPO:     ${{ github.repository }}
          WORKFLOW: ${{ matrix.workflow }}
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/actions/workflows/${WORKFLOW}/dispatches" \
            -d '{"ref":"main"}'
          echo ""
          echo "  ${WORKFLOW} workflow_dispatch sent at $(date -u +%H:%M:%S)Z"
