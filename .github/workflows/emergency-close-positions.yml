name: Emergency Close — autonomous position closer

# v3.4.5 (2026-05-14): script-picker bug fix.
#   Bug (v3.4.3-v3.4.4): `ls -t scripts/emergency_close_*.py | head -1`
#   ordered by mtime, which on a fresh GH Actions runner checkout assigns
#   similar timestamps to all files — falls back to filesystem/alpha order,
#   non-deterministic. Caused 22:53 UTC 2026-05-13 to pick May 12 script
#   (targets already closed) instead of May 13 evening script.
#   Fix: pick by FILENAME DATE SUFFIX (lexicographic descending sort works
#   because emergency_close_YYYYMMDD[_suffix].py format keeps YYYYMMDD as
#   the dominating prefix). Highest YYYYMMDD wins, with _suffix variants
#   beating bare YYYYMMDD on the same day (because `_` > `.`).
#
# Modes:
#   workflow_dispatch — manual trigger, operator picks script via input
#   push (to main, paths: scripts/emergency_close_*.py)
#     → fires only if commit message contains [auto-execute] tag
#     → uses the script added/modified in that commit
#   schedule (*/3 * * * *)
#     → polls main every 3 min
#     → finds emergency_close_*.py with highest filename-date suffix
#     → executes if no exit-reports/${basename}-*.log exists yet
#     → idempotent: log file presence prevents duplicate execution
#
# Safety: auto-execute paths require valid script_name pattern
# (scripts/emergency_close_*.py); arbitrary paths rejected.
#
# Use real Alpaca GitHub Secrets (ALPACA_API_KEY / ALPACA_SECRET_KEY)
# bypassing broken Claude.ai routine sandbox keys.

on:
  push:
    branches: [main]
    paths:
      - 'scripts/emergency_close_*.py'
  schedule:
    # Poll every 3 min — autonomous safety net when GITHUB_TOKEN-pushed
    # main commits don't trigger downstream workflows.
    - cron: '*/3 * * * *'
  workflow_dispatch:
    inputs:
      script:
        description: 'Script path (default = newest emergency_close_*.py)'
        required: false
        type:     string
        default:  ''
      dry_run:
        description: 'Dry-run mode (preview, do not place)'
        required: false
        type:     boolean
        default:  false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # On push event: require [auto-execute] in commit message
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      contains(github.event.head_commit.message, '[auto-execute]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Determine script + idempotency check
        id: pick
        run: |
          MODE="${{ github.event_name }}"

          # Pick script based on trigger source.
          # IMPORTANT: schedule + push-fallback use FILENAME-DATE sort
          # (lexicographic descending), NOT mtime (`ls -t`) — mtime is
          # non-deterministic on fresh runner checkout.
          pick_by_filename_date() {
            ls scripts/emergency_close_*.py 2>/dev/null | sort -r | head -1
          }

          if [ "$MODE" = "workflow_dispatch" ] && [ -n "${{ inputs.script }}" ]; then
            SCRIPT="${{ inputs.script }}"
            echo "Manual trigger: $SCRIPT"
          elif [ "$MODE" = "push" ]; then
            # On push: take the modified emergency_close_*.py from the push commit
            SCRIPT=$(git show --name-only --pretty=format: HEAD | \
                     grep -E '^scripts/emergency_close_.*\.py$' | head -1)
            [ -z "$SCRIPT" ] && SCRIPT=$(pick_by_filename_date)
            echo "Push-triggered: $SCRIPT"
          else
            # Schedule poll: filename-date sort (highest YYYYMMDD wins).
            SCRIPT=$(pick_by_filename_date)
            echo "Schedule-poll: candidate=$SCRIPT (filename-date sort)"
          fi

          if [ -z "$SCRIPT" ] || [ ! -f "$SCRIPT" ]; then
            echo "ERROR: no valid emergency_close script found"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Validate pattern
          case "$SCRIPT" in
            scripts/emergency_close_*.py) ;;
            *) echo "ERROR: bad pattern: $SCRIPT"; echo "skip=true" >> $GITHUB_OUTPUT; exit 0 ;;
          esac

          # Idempotency: skip if a log already exists for this script today
          SCRIPT_BASE=$(basename "$SCRIPT" .py)
          EXISTING=$(ls "exit-reports/${SCRIPT_BASE}-"*.log 2>/dev/null | head -1)
          if [ -n "$EXISTING" ]; then
            echo "Already processed: $EXISTING — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Safety: don't auto-run scripts whose FILENAME date is >2 days old.
          # Compare YYYYMMDD-in-filename to today (UTC). mtime is unreliable
          # on fresh runner checkouts (everything looks freshly created).
          SCRIPT_DATE=$(echo "$SCRIPT" | sed -nE 's|.*emergency_close_([0-9]{8}).*\.py$|\1|p')
          TODAY=$(date -u +%Y%m%d)
          if [ -n "$SCRIPT_DATE" ]; then
            AGE_DAYS=$(( ($(date -u -d "$TODAY" +%s) - $(date -u -d "$SCRIPT_DATE" +%s)) / 86400 ))
            if [ "$AGE_DAYS" -gt 2 ]; then
              echo "Script $SCRIPT filename-date is ${AGE_DAYS}d old — skipping (>2d)"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Script filename-date OK: ${AGE_DAYS}d old"
          else
            echo "WARN: couldn't parse YYYYMMDD from $SCRIPT — proceeding anyway"
          fi

          echo "Will execute: $SCRIPT"
          echo "script=$SCRIPT" >> $GITHUB_OUTPUT
          echo "script_base=$SCRIPT_BASE" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Run emergency close
        if: steps.pick.outputs.skip != 'true'
        env:
          PYTHONIOENCODING:    utf-8
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
        id: run_script
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          set +e
          python "${{ steps.pick.outputs.script }}" $ARGS 2>&1 | tee /tmp/emergency_close.log
          EXIT=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          echo "=== Exit code: $EXIT ==="
          # Determine success: exit 0 AND machine-readable result shows failed=0
          if [ "$EXIT" = "0" ] && grep -q '"failed": 0' /tmp/emergency_close.log 2>/dev/null; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Save log + idempotency marker (ONLY on success)
        # v3.4.4 idempotency fix 2026-05-13 22:05: previously workflow always
        # wrote log file regardless of script outcome → idempotency check
        # blocked retries even after failed runs. Now log is committed ONLY
        # when script reports zero failures (success=true). Market-closed
        # failures will NOT block next cron tick from retrying when market
        # reopens.
        if: steps.pick.outputs.skip != 'true' && ! inputs.dry_run && steps.run_script.outputs.success == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p exit-reports
          OUT="exit-reports/${{ steps.pick.outputs.script_base }}-$(date -u +%Y-%m-%d_%H%M).log"
          cp /tmp/emergency_close.log "$OUT"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          git add "$OUT"
          # Pre-commit dedup check: did another concurrent run produce same log?
          if [ -z "$(ls exit-reports/${{ steps.pick.outputs.script_base }}-*.log 2>/dev/null | grep -v "$(basename $OUT)")" ]; then
            git commit -m "emergency-close: $(date -u +%Y-%m-%d_%H%M) - ${{ steps.pick.outputs.script_base }} [automerge]"
            for attempt in 1 2 3; do
              if git push origin "$BRANCH"; then
                echo "Pushed marker on attempt ${attempt}."
                exit 0
              fi
              git pull --rebase origin "$BRANCH" || true
              sleep $((attempt * 2))
            done
            echo "Push failed; log is in workflow output only."
          else
            echo "Concurrent run already pushed log — skipping commit"
          fi
