name: Defense Market Monitor — 5min scan 24/7

# v3.2 schedule (2026-05-12): every 5 min around the clock so news pickup
# is fast regardless of market hours. The per-instrument trading window
# (config/instrument_windows.json + shared/instrument_windows.py) gates
# order placement — pre-market signals go to [QUEUED] / [DEFERRED] email,
# not to Alpaca.

on:
  schedule:
    # v3.2.1 (2026-05-13): bumped 5→10 min after GH Actions budget audit.
    # 45k/month cron invocations vs 2000-min/month private-repo tier limit
    # was throttling all workflows to ~7% expected rate. 10 min still
    # responsive for news pickup; per-instrument gate handles execution.
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  scan-defense:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r defense-monitor/requirements.txt

      - name: Run defense market scan
        env:
          PYTHONIOENCODING:              utf-8
          LC_ALL:                        C
          LANG:                          C
          ALPACA_API_KEY:                ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:             ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_DEFENSE_WORKER_URL: ${{ secrets.CLOUDFLARE_DEFENSE_WORKER_URL }}
          NEWSAPI_KEY:                   ${{ secrets.NEWSAPI_KEY }}
          FINNHUB_API_KEY:               ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_USER:                    ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                  ${{ secrets.NOTIFY_EMAIL }}
        run: python defense-monitor/monitor.py
