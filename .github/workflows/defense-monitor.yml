name: Defense Market Monitor — 30min scan

on:
  schedule:
    # Co 30 minut, 24/7 (DoD publikuje kontrakty w dni robocze ~17:00 ET)
    - cron: '0,30 * * * *'
  workflow_dispatch:

jobs:
  scan-defense:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r defense-monitor/requirements.txt

      - name: Run defense market scan
        env:
          PYTHONIOENCODING:              utf-8
          LC_ALL:                        C
          LANG:                          C
          ALPACA_API_KEY:                ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:             ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_DEFENSE_WORKER_URL: ${{ secrets.CLOUDFLARE_DEFENSE_WORKER_URL }}
          NEWSAPI_KEY:                   ${{ secrets.NEWSAPI_KEY }}
          FINNHUB_API_KEY:               ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_USER:                    ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:            ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                  ${{ secrets.NOTIFY_EMAIL }}
        run: python defense-monitor/monitor.py
