name: Options Exit Monitor — TP/SL polling

on:
  schedule:
    # Co 5 minut podczas sesji giełdowej (9:30-16:00 ET = 13:30-20:00 UTC)
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check-options-exits:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r options-exit-monitor/requirements.txt

      - name: Run options exit monitor
        env:
          PYTHONIOENCODING:    utf-8
          LC_ALL:              C
          LANG:                C
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        run: python options-exit-monitor/monitor.py
