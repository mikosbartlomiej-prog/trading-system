name: Morning Allocator — Capital Deployment Executor

# Triggers ~5 min after US market open (13:30 UTC) to execute orders
# from yesterday evening's allocation plan (generated by daily-learning
# at 21:00 UTC). Reads config/capital_deployment.json::auto_execute_rebalance;
# when false, prints what WOULD be placed and exits 0 (no-op).
#
# DEPLOY:
#   1. Copy this file to .github/workflows/morning-allocator.yml via GitHub UI
#      (OAuth proxy blocks workflow file pushes from Claude Code sessions)
#   2. Required repo secrets (already present from other workflows):
#        ALPACA_API_KEY, ALPACA_SECRET_KEY,
#        GMAIL_USER, GMAIL_APP_PASSWORD, NOTIFY_EMAIL
#   3. Enable "Allow GitHub Actions to create/approve PRs" if not already
#      (allocator workflow doesn't open PRs but uses the same permission
#      scope for [automerge] commits of execution.json files)

on:
  schedule:
    # 13:35 UTC = 09:35 ET (5 min after market open). Weekdays only.
    - cron: '35 13 * * 1-5'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force-execute even if auto_execute_rebalance=false'
        required: false
        type:     boolean
        default:  false
      dry_run:
        description: 'Dry-run (print plan, do not call Alpaca)'
        required: false
        type:     boolean
        default:  false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  # v3.28 INCIDENT CONTAINMENT — hard-pin every broker / live flag false.
  # The "Refuse if any broker / live flag is truthy" step below aborts
  # the workflow if any of these gets flipped at runtime. The allocator
  # incident gate inside execute_allocation_plan.py (Phase 2) is the
  # SECOND defense layer — it BLOCKs whenever broker_repair_required,
  # safe_mode, P13 retry-storm, or any of the other incident states
  # are active.
  ALLOW_BROKER_PAPER:                       "false"
  EDGE_GATE_ENABLED:                        "false"
  BROKER_EXECUTION_ENABLED:                 "false"
  LIVE_TRADING:                             "false"
  LIVE_ENABLED:                             "false"
  GO_LIVE:                                  "false"
  LIVE_TRADING_ENABLED:                     "false"
  LLM_PRE_ORDER_VETO_HONORED:               "false"
  OPERATOR_APPROVED_BROKER_PAPER_CANARY:    "false"
  LLM_AGENTS_SCHEDULED:                     "false"

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refuse if any broker / live flag is truthy
        # v3.28 safety pin. This MUST stay BEFORE any allocator step.
        # If any of the 7 broker/live flags has been flipped truthy (env
        # override, workflow_dispatch typo, accidental upstream change),
        # we abort immediately — no allocator invocation, no plan read,
        # no broker call. Matches daily-reporters.yml refusal contract.
        run: |
          for v in ALLOW_BROKER_PAPER EDGE_GATE_ENABLED \
                    BROKER_EXECUTION_ENABLED LIVE_TRADING \
                    LIVE_ENABLED GO_LIVE LIVE_TRADING_ENABLED \
                    LLM_PRE_ORDER_VETO_HONORED \
                    OPERATOR_APPROVED_BROKER_PAPER_CANARY \
                    LLM_AGENTS_SCHEDULED; do
            val=$(printf '%s' "${!v}" | tr '[:upper:]' '[:lower:]')
            if [ "$val" = "true" ] || [ "$val" = "1" ] || \
               [ "$val" = "yes" ] || [ "$val" = "on" ]; then
              echo "REFUSED: $v is truthy"
              exit 1
            fi
          done
          echo "all broker/live flags pinned false ✓"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Execute allocation plan
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:    utf-8
          LC_ALL:              C
          LANG:                C
          ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:        ${{ secrets.NOTIFY_EMAIL }}
        # v3.28 — execute_allocation_plan.py evaluates the
        # allocator_incident_gate (Phase 2) as the FIRST action inside
        # main(), BEFORE plan-file lookup, BEFORE allocator import,
        # BEFORE any broker call. When the gate returns BLOCK_* the
        # script writes docs/MORNING_ALLOCATOR_BLOCKED_<date>.md and
        # exits 0 — no orders submitted, no false workflow failure.
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/execute_allocation_plan.py $ARGS

      - name: Commit execution log + trace
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          # Stage today's execution + trace artifacts (if any)
          git add learning-loop/allocations/ 2>/dev/null || true
          # v3.28 — also stage any incident-gate BLOCK doc the allocator
          # script may have produced this morning (narrow allow-list,
          # never broker-credential outputs).
          git add 'docs/MORNING_ALLOCATOR_BLOCKED_*.md' 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No execution artifacts to commit (auto_execute likely OFF)."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "allocator: morning execution ${DATE} [automerge]"
            # Push with retry-on-race (matches auto-merge.yml pattern).
            # Routine commits or other crons may have pushed between pull
            # and push; rebase + retry handles it.
            for attempt in 1 2 3; do
              if git push origin "$BRANCH"; then
                echo "Pushed execution log on attempt ${attempt}."
                exit 0
              fi
              echo "Push attempt ${attempt} failed — rebasing on origin and retrying."
              git pull --rebase origin "$BRANCH" || true
              sleep $((attempt * 2))
            done
            echo "Push failed after 3 attempts; execution log is in workflow logs only."
            exit 1
          fi
