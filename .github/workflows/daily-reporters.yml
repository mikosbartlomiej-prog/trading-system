name: Daily Reporters — read-only aggregations (v3.27)

# v3.27 (2026-06-15) — Consolidated daily reporter runner.
#
# This workflow invokes every read-only reporter script in sequence:
#
#   - scripts/check_heartbeat_freshness.py
#   - scripts/check_evidence_throughput_sla.py
#   - scripts/build_real_market_evidence_status.py
#   - scripts/build_monitor_runtime_diagnostics_report.py
#   - scripts/gate_distribution_report.py
#   - scripts/build_near_miss_report.py
#   - scripts/build_confidence_precalibration_readiness.py
#
# v3.26-new (run only if present):
#   - scripts/strategy_threshold_reality_report.py   (v3.26)
#   - scripts/replay_entry_candidate_discovery.py    (v3.26)
#
# v3.27-new seeders (all LOCAL-ONLY — no network calls):
#   - scripts/seed_backfill_snapshots.py             (v3.27)
#   - scripts/seed_near_miss_from_evidence.py        (v3.27)
#   - scripts/seed_strategy_variant_quarantine.py    (v3.27)
#   - scripts/seed_shadow_candidate_queue.py         (v3.27)
#   - scripts/build_opportunity_density_plan.py      (v3.27)
#
# All reporters and seeders are READ-ONLY against the broker. None of
# them place orders, none of them import shared/alpaca_orders, none
# of them mutate strategy thresholds, none of them call the network.
#
# Cron: 04:30 UTC daily (non-conflicting; runs before the LLM-advisory
# mesh and after the prior-day shadow-evidence cycle).

on:
  schedule:
    - cron: '30 4 * * *'
  workflow_dispatch:

permissions:
  contents: write     # commits the regenerated reports

concurrency:
  group: daily-reporters-${{ github.ref }}
  cancel-in-progress: false

env:
  # Hard-pin every broker-execution flag false. The job refuses to
  # run if any are truthy.
  ALLOW_BROKER_PAPER:                       "false"
  EDGE_GATE_ENABLED:                        "false"
  BROKER_EXECUTION_ENABLED:                 "false"
  LIVE_TRADING:                             "false"
  LIVE_ENABLED:                             "false"
  GO_LIVE:                                  "false"
  LIVE_TRADING_ENABLED:                     "false"
  LLM_PRE_ORDER_VETO_HONORED:               "false"
  OPERATOR_APPROVED_BROKER_PAPER_CANARY:    "false"
  LLM_AGENTS_SCHEDULED:                     "false"

jobs:
  reporters:
    name: Run daily reporters
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refuse if any broker / live flag is truthy
        run: |
          for v in ALLOW_BROKER_PAPER EDGE_GATE_ENABLED \
                    BROKER_EXECUTION_ENABLED LIVE_TRADING \
                    LIVE_ENABLED GO_LIVE LIVE_TRADING_ENABLED \
                    LLM_PRE_ORDER_VETO_HONORED \
                    OPERATOR_APPROVED_BROKER_PAPER_CANARY \
                    LLM_AGENTS_SCHEDULED; do
            val=$(printf '%s' "${!v}" | tr '[:upper:]' '[:lower:]')
            if [ "$val" = "true" ] || [ "$val" = "1" ] || \
               [ "$val" = "yes" ] || [ "$val" = "on" ]; then
              echo "REFUSED: $v is truthy"
              exit 1
            fi
          done
          echo "all broker/live flags pinned false ✓"

      - name: Heartbeat freshness check
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        # Non-fatal: exit codes 2 (STALE) / 3 (MISSING) are diagnostic.
        run: |
          python3 scripts/check_heartbeat_freshness.py || true

      - name: Evidence throughput SLA check
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/check_evidence_throughput_sla.py || true

      - name: Real-market evidence status
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/build_real_market_evidence_status.py || true

      - name: Monitor runtime diagnostics
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/build_monitor_runtime_diagnostics_report.py \
            || true

      - name: Gate distribution report
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/gate_distribution_report.py || true

      - name: Near-miss report
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/build_near_miss_report.py || true

      - name: Seed backfill snapshots (v3.27-new, local-only, no network)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/seed_backfill_snapshots.py ]; then
            python3 scripts/seed_backfill_snapshots.py || true
          else
            echo "scripts/seed_backfill_snapshots.py not present; skipping."
          fi

      - name: Seed near-miss from evidence (v3.27-new)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/seed_near_miss_from_evidence.py ]; then
            python3 scripts/seed_near_miss_from_evidence.py || true
          else
            echo "scripts/seed_near_miss_from_evidence.py not present; skipping."
          fi

      - name: Seed strategy variant quarantine (v3.27-new)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/seed_strategy_variant_quarantine.py ]; then
            python3 scripts/seed_strategy_variant_quarantine.py || true
          else
            echo "scripts/seed_strategy_variant_quarantine.py not present; skipping."
          fi

      - name: Seed shadow candidate queue (v3.27-new)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/seed_shadow_candidate_queue.py ]; then
            python3 scripts/seed_shadow_candidate_queue.py || true
          else
            echo "scripts/seed_shadow_candidate_queue.py not present; skipping."
          fi

      - name: Confidence pre-calibration readiness
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          python3 scripts/build_confidence_precalibration_readiness.py \
            || true

      - name: Strategy threshold reality report (v3.26-new, optional)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/strategy_threshold_reality_report.py ]; then
            python3 scripts/strategy_threshold_reality_report.py \
              || true
          else
            echo "scripts/strategy_threshold_reality_report.py not " \
                 "present yet (v3.26-new); skipping."
          fi

      - name: Replay entry-candidate discovery (v3.26-new, optional)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/replay_entry_candidate_discovery.py ]; then
            python3 scripts/replay_entry_candidate_discovery.py \
              || true
          else
            echo "scripts/replay_entry_candidate_discovery.py not " \
                 "present yet (v3.26-new); skipping."
          fi

      - name: Opportunity density plan (v3.27-new)
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/build_opportunity_density_plan.py ]; then
            python3 scripts/build_opportunity_density_plan.py || true
          else
            echo "scripts/build_opportunity_density_plan.py not present; skipping."
          fi

      - name: Reconcile equity gap (v3.28-new, observation-only)
        # v3.28 INCIDENT CONTAINMENT — read-only reconciliation of the
        # equity-gap signal against broker_repair_required state. NEVER
        # places orders. NEVER cancels orders. NEVER closes positions.
        # Guarded by file existence so the workflow does not fail before
        # the script ships.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/reconcile_equity_gap.py ]; then
            python3 scripts/reconcile_equity_gap.py || true
          else
            echo "scripts/reconcile_equity_gap.py not present; skipping."
          fi

      - name: Verify manual broker repair (v3.28-new, DRY-RUN ONLY)
        # v3.28 INCIDENT CONTAINMENT — operator-marker-gated repair
        # verifier. Default mode is READ-ONLY/dry-run; the safety
        # contract REQUIRES that this workflow never invoke it with
        # --apply or --execute or any flag that would clear the
        # broker_repair_required entry. Guarded by file existence.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/verify_manual_broker_repair.py ]; then
            python3 scripts/verify_manual_broker_repair.py --dry-run \
              || true
          else
            echo "scripts/verify_manual_broker_repair.py not present; skipping."
          fi

      - name: Safe-mode consistency check (v3.29-new)
        # v3.29 ETAP 2 — read-only consistency check between
        # SAFE_MODE_ENTERED audit rows and runtime_state. Never mutates
        # safe_mode; never flips any flag.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/check_safe_mode_consistency.py ]; then
            python3 scripts/check_safe_mode_consistency.py || true
          else
            echo "scripts/check_safe_mode_consistency.py not present; skipping."
          fi

      - name: Backfill broker_repair from incidents (v3.29-new)
        # v3.29 ETAP 3 — read historical P13 incidents and append
        # broker_repair_required entries. Honours operator markers so
        # an entry the operator already cleared is NOT re-added.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/backfill_broker_repair_from_incidents.py ]; then
            python3 scripts/backfill_broker_repair_from_incidents.py \
              || true
          else
            echo "scripts/backfill_broker_repair_from_incidents.py not present; skipping."
          fi

      - name: Build system activation status (v3.29-new)
        # v3.29 ETAP 8 — master gate verdict snapshot. Read-only.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/build_system_activation_status.py ]; then
            python3 scripts/build_system_activation_status.py || true
          else
            echo "scripts/build_system_activation_status.py not present; skipping."
          fi

      - name: Build shadow candidate queue (v3.29-new)
        # v3.29 ETAP 8 — read-only seed of the eligible row queue.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/build_shadow_candidate_queue.py ]; then
            python3 scripts/build_shadow_candidate_queue.py || true
          else
            echo "scripts/build_shadow_candidate_queue.py not present; skipping."
          fi

      - name: Build trigger watchlist (v3.29-new)
        # v3.29 ETAP 8 — read-only watchlist surface.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/build_trigger_watchlist.py ]; then
            python3 scripts/build_trigger_watchlist.py || true
          else
            echo "scripts/build_trigger_watchlist.py not present; skipping."
          fi

      - name: Universe opportunity review (v3.29-new)
        # v3.29 ETAP 8 — read-only universe report.
        env:
          PYTHONIOENCODING: utf-8
          LC_ALL:           C
          LANG:             C
        run: |
          if [ -f scripts/universe_opportunity_review.py ]; then
            python3 scripts/universe_opportunity_review.py || true
          else
            echo "scripts/universe_opportunity_review.py not present; skipping."
          fi

      - name: Commit and push reporter artifacts
        # Narrow allow-list: only reporter output paths.
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${GITHUB_REF_NAME:-main}"
          git pull --ff-only origin "$BRANCH" 2>/dev/null || true
          # Strictly only the reporter outputs.
          git add learning-loop/heartbeat_freshness_latest.json    2>/dev/null || true
          git add learning-loop/evidence_quality_latest.json       2>/dev/null || true
          git add learning-loop/gate_distribution_latest.json      2>/dev/null || true
          git add learning-loop/near_miss_status_latest.json       2>/dev/null || true
          git add learning-loop/monitor_runtime_diag_status_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/confidence_precalibration_readiness_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/real_market_evidence_status_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/evidence_throughput_sla_latest.json 2>/dev/null || true
          git add learning-loop/strategy_threshold_reality_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/replay_entry_candidate_discovery_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/replay_discovery_latest.json   2>/dev/null || true
          # v3.27 seeder outputs (narrow allow-list):
          git add learning-loop/backfill_snapshot_status_latest.json \
                                                                    2>/dev/null || true
          git add 'learning-loop/backfill_snapshots/*.json'    2>/dev/null || true
          git add learning-loop/near_miss_seed_status_latest.json \
                                                                    2>/dev/null || true
          git add 'learning-loop/near_miss/*.jsonl'            2>/dev/null || true
          git add learning-loop/strategy_variant_quarantine_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/shadow_candidate_queue_latest.json \
                                                                    2>/dev/null || true
          git add learning-loop/opportunity_density_plan_latest.json \
                                                                    2>/dev/null || true
          git add docs/HEARTBEAT_FRESHNESS_STATUS.md           2>/dev/null || true
          git add docs/EVIDENCE_THROUGHPUT_SLA_STATUS.md       2>/dev/null || true
          git add docs/REAL_MARKET_EVIDENCE_STATUS.md          2>/dev/null || true
          git add docs/MONITOR_RUNTIME_DIAGNOSTICS.md          2>/dev/null || true
          git add docs/GATE_DISTRIBUTION_STATUS.md             2>/dev/null || true
          git add docs/NEAR_MISS_STATUS.md                     2>/dev/null || true
          git add docs/CONFIDENCE_PRECALIBRATION_READINESS.md  2>/dev/null || true
          git add docs/STRATEGY_THRESHOLD_REALITY.md           2>/dev/null || true
          git add docs/REPLAY_ENTRY_CANDIDATE_DISCOVERY.md     2>/dev/null || true
          git add docs/BACKFILL_SNAPSHOT_STATUS.md             2>/dev/null || true
          git add docs/NEAR_MISS_SEED_STATUS.md                2>/dev/null || true
          git add docs/OPPORTUNITY_DENSITY_PLAN.md             2>/dev/null || true
          # v3.28 incident-containment reporter outputs (narrow allow-
          # list — only the read-only reconcile + verify reports). The
          # broker_repair_required_latest.json itself is NEVER staged
          # here — that state file is written only by the patched retry
          # path in exit-monitor + the operator-marker clear path; it
          # is never re-emitted by a reporter cron.
          git add learning-loop/equity_gap_reconciliation_latest.json \
                                                                    2>/dev/null || true
          git add docs/EQUITY_GAP_RECONCILIATION.md             2>/dev/null || true
          git add learning-loop/manual_broker_repair_verify_latest.json \
                                                                    2>/dev/null || true
          git add docs/MANUAL_BROKER_REPAIR_VERIFY.md           2>/dev/null || true
          # v3.29 ETAP 2/3/8 reporter outputs (narrow allow-list).
          git add learning-loop/safe_mode_consistency_latest.json \
                                                                    2>/dev/null || true
          git add docs/SAFE_MODE_CONSISTENCY_STATUS.md          2>/dev/null || true
          git add learning-loop/broker_repair_backfill_status_latest.json \
                                                                    2>/dev/null || true
          git add docs/BROKER_REPAIR_BACKFILL_STATUS.md         2>/dev/null || true
          git add learning-loop/system_activation_status_latest.json \
                                                                    2>/dev/null || true
          git add docs/SYSTEM_ACTIVATION_STATUS.md              2>/dev/null || true
          git add learning-loop/trigger_watchlist_latest.json   2>/dev/null || true
          git add docs/TRIGGER_WATCHLIST.md                     2>/dev/null || true
          git add learning-loop/universe_opportunity_review_latest.json \
                                                                    2>/dev/null || true
          git add docs/UNIVERSE_OPPORTUNITY_REVIEW.md           2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No reporter changes (quiet day)."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "daily-reporters: refresh ${DATE} [automerge]"
            for attempt in 1 2 3; do
              if git push origin "$BRANCH"; then
                echo "Pushed daily-reporters refresh on attempt ${attempt}."
                break
              fi
              echo "Push attempt ${attempt} failed — pull --rebase + retry"
              git pull --rebase origin "$BRANCH" || true
              sleep $((attempt * 3))
            done
          fi
