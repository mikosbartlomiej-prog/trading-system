name: Options Monitor — CALL/PUT proposals

# v3.2 schedule (2026-05-12): bumped from */10 to */5 during regular
# session. Options chain data only updates during equity hours so no
# point scanning outside that window. AUTO_EXECUTE_OPTIONS=true path
# places orders direct via Alpaca REST; per-instrument trading window
# gate in shared/instrument_windows.py prevents off-hours fills.

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# v3.18.0 P0-001 (2026-06-04): contents:write required for heartbeat
# snapshot persistence. Without commit step, heartbeat.ping() updates
# runtime_state in-process but never reaches origin → confidence
# system_health component sees stale snapshot. Allowed write scope =
# ONLY learning-loop/runtime_state.json (enforced by `git add` below).
permissions:
  contents: write

jobs:
  scan-options:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r options-monitor/requirements.txt

      - name: Run options monitor
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:               utf-8
          LC_ALL:                         C
          LANG:                           C
          ALPACA_API_KEY:                 ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:              ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY:                ${{ secrets.FINNHUB_API_KEY }}
          CLOUDFLARE_OPTIONS_WORKER_URL:  ${{ secrets.CLOUDFLARE_OPTIONS_WORKER_URL }}
          GMAIL_USER:                     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:             ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                   ${{ secrets.NOTIFY_EMAIL }}
        run: python options-monitor/monitor.py

      - name: Commit runtime_state.json if changed
        # v3.18.0 P0-001 — persist heartbeat snapshot to main with
        # retry-on-non-fast-forward (mirror crypto-monitor pattern).
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet learning-loop/runtime_state.json 2>/dev/null; then
            echo "no runtime_state changes"
            exit 0
          fi
          git pull --ff-only origin main 2>/dev/null || true
          git add learning-loop/runtime_state.json
          if git diff --cached --quiet 2>/dev/null; then
            exit 0
          fi
          git commit -m "options-monitor: runtime_state $(date -u +%Y-%m-%d_%H%M) [automerge]" || exit 0
          for attempt in 1 2 3; do
            if git push origin "${GITHUB_REF_NAME:-main}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME:-main}" 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts — runtime_state not persisted"
