name: Crypto Monitor — 11 coins predator scan (24/7)

# v3.2 (2026-05-12): every 5 min 24/7 — crypto trades around the clock,
# short cadence catches predator-mode quick wins. Per-instrument trade
# window in shared/instrument_windows.py keeps everything else gated.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scan-crypto:
    runs-on: ubuntu-latest
    # Bumped 5 → 10 min: Curator poll can take up to 90s; with 11 coins
    # × ~2s API calls + Curator we want headroom.
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crypto-monitor/requirements.txt

      - name: Run crypto scan
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:             utf-8
          LC_ALL:                       C
          LANG:                         C
          ALPACA_API_KEY:               ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:            ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY:              ${{ secrets.FINNHUB_API_KEY }}
          CLOUDFLARE_CRYPTO_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_WORKER_URL }}
          CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL }}
          USE_CRYPTO_CURATOR:           'true'
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                 ${{ secrets.NOTIFY_EMAIL }}
        run: python crypto-monitor/monitor.py

      # Cleanup of pending-curation.json removed per spec §C — monitors must
      # not commit runtime state. Curator hand-off is now a runner-local
      # ephemeral artifact (lives only for the duration of the run).
      # If the file accidentally survives in the repo it is benign and will
      # be picked up by the manual-maintenance script.
