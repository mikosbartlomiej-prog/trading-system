name: Crypto Monitor — 11 coins predator scan (24/7)

# v3.2 (2026-05-12): every 5 min 24/7 — crypto trades around the clock,
# short cadence catches predator-mode quick wins. Per-instrument trade
# window in shared/instrument_windows.py keeps everything else gated.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  scan-crypto:
    runs-on: ubuntu-latest
    # Bumped 5 → 10 min: Curator poll can take up to 90s; with 11 coins
    # × ~2s API calls + Curator we want headroom.
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r crypto-monitor/requirements.txt

      - name: Run crypto scan
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:             utf-8
          LC_ALL:                       C
          LANG:                         C
          ALPACA_API_KEY:               ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:            ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY:              ${{ secrets.FINNHUB_API_KEY }}
          CLOUDFLARE_CRYPTO_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_WORKER_URL }}
          CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL: ${{ secrets.CLOUDFLARE_CRYPTO_CURATOR_WORKER_URL }}
          USE_CRYPTO_CURATOR:           'true'
          GMAIL_USER:                   ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:           ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:                 ${{ secrets.NOTIFY_EMAIL }}
        run: python crypto-monitor/monitor.py

      - name: Commit routine_budget state (if changed)
        # v3.8.8 (2026-05-18): Crypto Curator increments routine_budget;
        # persist to main so cap of 5/day for P2_optional actually
        # enforces. Was ignored before → curator could fire 20×/day on
        # active days, eating Anthropic 24h rolling window before P0
        # Senior PM/Challenger/Revise rounds.
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet learning-loop/runtime_state.json 2>/dev/null; then
            echo "no runtime_state changes"
            exit 0
          fi
          git pull --ff-only origin main 2>/dev/null || true
          git add learning-loop/runtime_state.json
          if git diff --cached --quiet 2>/dev/null; then
            exit 0
          fi
          git commit -m "crypto-monitor: routine_budget state $(date -u +%Y-%m-%d_%H%M) [automerge]" || exit 0
          for attempt in 1 2 3; do
            if git push origin "${GITHUB_REF_NAME:-main}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME:-main}" 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts — budget state not persisted"
