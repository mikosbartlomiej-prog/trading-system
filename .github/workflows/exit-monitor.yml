name: Exit Monitor — dual cron (market 5min + off-hours 15min)

# v3.5 (vNext): per spec §C exit-monitor must NOT commit state.json on
# every cron tick (git-as-runtime-database anti-pattern). peak_tracker
# state persistence is BACKLOG: migrate daily_peak + trailing_state to
# learning-loop/runtime_state.json behind a separate workflow with
# STATE_WRITE_ACTOR=manual-maintenance so it can write without
# violating the state-policy invariant.
# Without persistence, PROFIT_LOCK detection resets each tick — operator
# is alerted via daily-health-check if drift becomes large.

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
    - cron: '*/15 0-12,21-23 * * *'
    - cron: '*/15 * * * 0,6'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-positions:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r exit-monitor/requirements.txt

      - name: Run exit monitor
        env:
          PYTHONIOENCODING:           utf-8
          LC_ALL:                     C
          LANG:                       C
          ALPACA_API_KEY:             ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:          ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_EXIT_WORKER_URL: ${{ secrets.CLOUDFLARE_EXIT_WORKER_URL }}
          GMAIL_USER:                 ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:         ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:               ${{ secrets.NOTIFY_EMAIL }}
        run: python exit-monitor/monitor.py
