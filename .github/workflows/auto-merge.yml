name: Auto-merge claude/* branches to main

# Triggered on push to any claude/* branch.
# If the head commit message contains "[automerge]", workflow:
#   1. Fast-forward-merges that branch into main using GITHUB_TOKEN
#      (which has contents:write, unlike the OAuth proxy used by Claude
#      Code sandboxed sessions which is blocked 403 on main pushes).
#   2. Optionally deletes the source branch after successful merge.
#
# Why: Claude Code agent sessions can author commits + push to feature
# branches but cannot push to main (proxy enforces a workflow-scope-like
# restriction). This workflow is the authorized escape hatch.
#
# Safety:
# - Only runs on branches matching `claude/*` (not on main itself, not
#   on user-created branches that don't match).
# - Requires explicit `[automerge]` tag in commit message — accidental
#   pushes don't auto-merge.
# - Uses fast-forward only by default (no merge commit, no conflict
#   resolution); falls back to a merge commit only when FF impossible.
# - Workflow run log is audit trail; every auto-merge has a corresponding
#   GitHub Actions run.

on:
  push:
    branches:
      - 'claude/**'

permissions:
  contents: write

jobs:
  auto-merge:
    # Skip if not tagged or if main is already at this commit
    if: contains(github.event.head_commit.message, '[automerge]')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch source branch
        run: git fetch origin "${{ github.ref_name }}"

      - name: Attempt fast-forward merge
        id: ffmerge
        run: |
          set -e
          if git merge-base --is-ancestor "origin/main" "origin/${{ github.ref_name }}"; then
            git merge --ff-only "origin/${{ github.ref_name }}"
            echo "result=fast-forward" >> "$GITHUB_OUTPUT"
          else
            # Source branch diverged — try a merge commit instead.
            # If conflicts arise, fail loudly so a human resolves.
            git merge --no-ff -m "auto-merge ${{ github.ref_name }} into main [automerge]" "origin/${{ github.ref_name }}"
            echo "result=merge-commit" >> "$GITHUB_OUTPUT"
          fi

      - name: Push merged main
        run: git push origin main

      - name: Delete source branch
        if: steps.ffmerge.outputs.result != ''
        continue-on-error: true
        run: |
          git push origin --delete "${{ github.ref_name }}" || true
          echo "Deleted ${{ github.ref_name }} (or already gone)"

      - name: Summary
        run: |
          echo "✅ Auto-merged ${{ github.ref_name }} into main (${{ steps.ffmerge.outputs.result }})"
          echo "Source branch deleted."
