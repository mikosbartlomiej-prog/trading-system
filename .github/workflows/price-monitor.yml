name: Price Monitor — Momentum Breakout

on:
  schedule:
    # Co 5 minut podczas sesji giełdowej (9:30-16:00 ET = 13:30-20:00 UTC)
    # Poniedziałek-Piątek
    - cron: '*/5 13-20 * * 1-5'
  # Możliwość ręcznego uruchomienia z GitHuba
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# v3.18.0 P0-001 (2026-06-04): contents:write required for heartbeat
# snapshot persistence. Without commit step, heartbeat.ping() updates
# runtime_state in-process but never reaches origin → confidence
# system_health component sees stale snapshot. Allowed write scope =
# ONLY learning-loop/runtime_state.json (enforced by `git add` below).
permissions:
  contents: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r price-monitor/requirements.txt

      - name: Run price monitor (single check)
        env:
          RISK_PROFILE:        AGGRESSIVE_PAPER
          PYTHONIOENCODING:      utf-8
          LC_ALL:                C
          LANG:                  C
          ALPACA_API_KEY:        ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:     ${{ secrets.ALPACA_SECRET_KEY }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          FINNHUB_API_KEY:       ${{ secrets.FINNHUB_API_KEY }}
          GMAIL_USER:            ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:    ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:          ${{ secrets.NOTIFY_EMAIL }}
        run: python price-monitor/monitor.py --once

      - name: Commit runtime_state.json if changed
        # v3.18.0 P0-001 — persist heartbeat snapshot to main with
        # retry-on-non-fast-forward (mirror crypto-monitor pattern).
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet learning-loop/runtime_state.json 2>/dev/null; then
            echo "no runtime_state changes"
            exit 0
          fi
          git pull --ff-only origin main 2>/dev/null || true
          git add learning-loop/runtime_state.json
          if git diff --cached --quiet 2>/dev/null; then
            exit 0
          fi
          git commit -m "price-monitor: runtime_state $(date -u +%Y-%m-%d_%H%M) [automerge]" || exit 0
          for attempt in 1 2 3; do
            if git push origin "${GITHUB_REF_NAME:-main}"; then
              exit 0
            fi
            git pull --rebase origin "${GITHUB_REF_NAME:-main}" 2>/dev/null || true
            sleep $((attempt * 2))
          done
          echo "push failed after 3 attempts — runtime_state not persisted"
