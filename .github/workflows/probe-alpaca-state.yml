name: probe-alpaca-state

# One-shot diagnostic workflow — read-only Alpaca queries.
# Dispatched manually via `gh workflow run probe-alpaca-state.yml`.

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: probe-alpaca-${{ github.ref }}
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Probe Alpaca state
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: python scripts/probe_alpaca_closes_20260522.py
