name: politician-monitor

# Tracks Trump family / cabinet insider trades + bipartisan Congressional
# STOCK Act disclosures. Lane A (DJT Form 4) is real-time (2-day lag) and
# can auto-execute. Lane B (Capitol Trades PTRs) is 30-45 day lagged,
# default alert-only with cluster aggregation. v3.9.2 (2026-05-21).

on:
  schedule:
    # Every 2h, 24/7 — SEC EDGAR + Capitol Trades both update at irregular
    # hours, but disclosures aren't time-sensitive in minutes (lag is days).
    # Capped frequency to conserve Anthropic Routines daily budget.
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # persist politician-monitor/state.json dedupe cache

concurrency:
  group: politician-monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONIOENCODING:  utf-8
      LC_ALL:            C
      LANG:              C
      # Alpaca + email + LLM credentials (only needed if AUTO_EXECUTE_*)
      ALPACA_API_KEY:                            ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY:                         ${{ secrets.ALPACA_SECRET_KEY }}
      GMAIL_USER:                                ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD:                        ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_EMAIL:                              ${{ secrets.NOTIFY_EMAIL }}
      FINNHUB_API_KEY:                           ${{ secrets.FINNHUB_API_KEY }}
      CLOUDFLARE_POLITICIAN_CURATOR_WORKER_URL:  ${{ secrets.CLOUDFLARE_POLITICIAN_CURATOR_WORKER_URL }}
      # Feature flags
      USE_POLITICIAN_CURATOR:    "true"
      AUTO_EXECUTE_DJT_FORM4:    "true"    # Lane A — real-time, eligible
      AUTO_EXECUTE_STOCK_ACT:    "false"   # Lane B — default alert-only
      MAX_ALERTS_PER_RUN:        "3"
      # SEC compliance — User-Agent z prawdziwym kontaktem (mandatory per SEC policy).
      # CIK 0001849635 zweryfikowane 2026-05-21 jako Trump Media & Technology Group Corp.
      SEC_USER_AGENT:            "trading-system politician-monitor mikosbartlomiej@gmail.com"
      # Risk profile (inherited from main system)
      RISK_PROFILE:              "AGGRESSIVE_PAPER"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r politician-monitor/requirements.txt

      - name: Run scan
        run: |
          cd politician-monitor
          python monitor.py

      - name: Commit state (dedupe cache)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add politician-monitor/state.json || true
          # Also pick up runtime state from routine_budget if updated
          git add learning-loop/runtime_state.json || true

          if git diff --staged --quiet; then
            echo "No state changes to commit"
            exit 0
          fi

          BRANCH="${GITHUB_REF_NAME:-main}"
          git commit -m "politician-monitor: state $(date -u +%Y-%m-%d_%H%M) [automerge]"

          for attempt in 1 2 3; do
            if git push origin "$BRANCH"; then
              echo "Push attempt $attempt succeeded"
              break
            fi
            echo "Push attempt $attempt failed; rebase + retry"
            git pull --rebase origin "$BRANCH" || true
            sleep $((attempt * 2))
          done
